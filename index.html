<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>Off-Road Velociraptor Safari</title>
	<style>
		html,
		body {
			background: #000;
			width: 100%;
			height: 100%;
			overflow: visible;
			padding: 0;
			margin: 0;
		}

		div#gameContainer {
			background: transparent !important;
			position: absolute;
		}

		div#gameContainer canvas {
			position: absolute;
			image-rendering: optimizeSpeed;
			image-rendering: -webkit-crisp-edges;
			image-rendering: -moz-crisp-edges;
			image-rendering: -o-crisp-edges;
			image-rendering: crisp-edges;
			image-rendering: -webkit-optimize-contrast;
			image-rendering: optimize-contrast;
			image-rendering: pixelated;
			-ms-interpolation-mode: nearest-neighbor;
		}
	</style>
<!-- <script defer data-domain="blurst.com" src="https://plausible.wegner.systems/js/script.js"></script> -->
</head>

<body>
	<div id="gameContainer">
		<canvas id="unity-canvas"></canvas>
		<script>
			(function installNetworkLogging() {
				var originalFetch = window.fetch;
				if (originalFetch) {
					window.fetch = function (input, init) {
						var url = typeof input === "string" ? input : (input && input.url) || String(input);
						console.log("[net] fetch", (init && init.method) || "GET", url, init || {});
						return originalFetch.apply(this, arguments).then(function (response) {
							console.log("[net] fetch:response", response.status, response.url);
							return response;
						});
					};
				}

				var originalOpen = XMLHttpRequest.prototype.open;
				var originalSend = XMLHttpRequest.prototype.send;
				XMLHttpRequest.prototype.open = function (method, url) {
					this.__debugMethod = method;
					this.__debugUrl = url;
					console.log("[net] xhr:open", method, url);
					return originalOpen.apply(this, arguments);
				};
				XMLHttpRequest.prototype.send = function (body) {
					var xhr = this;
					console.log("[net] xhr:send", xhr.__debugMethod, xhr.__debugUrl, body);
					xhr.addEventListener("loadend", function () {
						console.log("[net] xhr:response", xhr.status, xhr.__debugMethod, xhr.__debugUrl);
					}, { once: true });
					return originalSend.apply(this, arguments);
				};
			})();
		</script>
		<script src="Build/rs.loader.js"></script>
		<script>
			createUnityInstance(document.querySelector("#unity-canvas"), {
				dataUrl: "Build/rs.data.unityweb",
				frameworkUrl: "Build/rs.framework.js.unityweb",
				codeUrl: "Build/rs.custom.wasm.unityweb",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "Flashbang Studios",
				productName: "Off-Road Velociraptor Safari",
				productVersion: "1.5",
			}).then(function (instance) {
				var canvas = instance.Module.canvas;
				var container = canvas.parentElement;
				function onResize() {
					var w;
					var h;

					if (scaleToFit) {
						w = window.innerWidth;
						h = window.innerHeight;

						var r = 768 / 1024;

						if (w * r > window.innerHeight) {
							w = Math.min(w, Math.ceil(h / r));
						}
						h = Math.floor(w * r);
					} else {
						w = 1024;
						h = 768;
					}

					container.style.width = canvas.style.width = w + "px";
					container.style.height = canvas.style.height = h + "px";
					container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
					container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
				}

				var scaleToFit;
				try {
					scaleToFit = !!JSON.parse("1");
				} catch (e) {
					scaleToFit = true;
				}
				window.addEventListener('resize', onResize);
				onResize();
			});
		</script>
	</div>
</body>

</html>
